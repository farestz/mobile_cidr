# Канонический список ASN мобильных операторов РФ.
#
# Источник для верификации:
#   holder:  https://stat.ripe.net/data/as-overview/data.json?resource=AS<N>
#   поиск:   https://stat.ripe.net/data/searchcomplete/data.json?resource=<query>
#
# Правила отбора:
#   1. Holder == legal entity оператора (см. поле `legal` у operator).
#   2. ASN относится к сотовой/GPRS-сети, а НЕ к: cloud, streaming, fixed-line
#      broadband (МГТС у МТС), enterprise/CDN. Региональные сотовые ASN
#      (-IRK, -KAZAN, -KAVKAZ и т.п.) включаются.
#   3. ASN с нулевым числом анонсов оставляем — могут начать анонсировать
#      позже; полезно фиксировать их принадлежность.
#
# `holder` ниже — снимок имени из RIPE на момент добавления. fetch.py
# при каждом запуске сверяет реальный holder и пишет MISMATCH при расхождении.

operators:
